name: SwiftX Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── Windows Build ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: pip install pyinstaller PySide6 Pillow

      - name: PNG ikonu ICO'ya dönüştür
        run: |
          python -c "from PIL import Image; img = Image.open('SXBETALOGO3.png'); img.save('SXBETALOGO3.ico')"

      - name: PyInstaller ile derle
        run: pyinstaller SwiftX.spec

      - name: data klasörünü exe yanına taşı
        run: Copy-Item -Recurse data dist\SwiftX\data

      - name: Zip oluştur
        run: Compress-Archive -Path dist/SwiftX/* -DestinationPath SwiftX-Windows.zip

      - name: Windows artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: SwiftX-Windows
          path: SwiftX-Windows.zip

  # ── Linux Build ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sistem bağımlılıklarını kur
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxcb-cursor0 libxkbcommon-x11-0

      - name: Bağımlılıkları kur
        run: pip install pyinstaller PySide6 Pillow

      - name: PNG ikonu ICO'ya dönüştür
        run: |
          python -c "from PIL import Image; img = Image.open('SXBETALOGO3.png'); img.save('SXBETALOGO3.ico')"

      - name: PyInstaller ile derle
        run: pyinstaller SwiftX.spec

      - name: data klasörünü exe yanına taşı
        run: cp -r data dist/SwiftX/data

      # dist/SwiftX/ klasörünü zip'le
      - name: Zip oluştur
        run: cd dist && zip -r ../SwiftX-Linux.zip SwiftX/

      - name: Linux artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: SwiftX-Linux
          path: SwiftX-Linux.zip

  # ── Release Oluştur ──────────────────────────────────────────────────────
  release:
    needs: [ build-windows, build-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Windows artifact indir
        uses: actions/download-artifact@v4
        with:
          name: SwiftX-Windows
          path: ./

      - name: Linux artifact indir
        uses: actions/download-artifact@v4
        with:
          name: SwiftX-Linux
          path: ./

      - name: GitHub Release yayınla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.27.1-openAlpha
          name: "SwiftX v0.27.1-openAlpha"
          body: |
            ## SwiftX v0.27.1-openAlpha

            ### İndirme / Download
            - **Windows**: `SwiftX-Windows.zip` → zip'i aç, `SwiftX.exe` dosyasını çalıştır
            - **Linux**: `SwiftX-Linux.zip` → zip'i aç, terminalde `chmod +x SwiftX && ./SwiftX` (ya da SwiftX dosyasını çalıştırın)

            > ⚠️ Windows'ta "Akıllı Uygulama Denetimi" uyarısı çıkarsa:
            > "Daha fazla bilgi edin" → "Yine de çalıştır"

            ### Bilinen Sorunlar (v0.27.2'de düzeltilecek)
            - Google hizmetlerinde "güvenli değil" hatası
            - YouTube videoları donabiliyor
            - Ayarlar/geçmiş menülerinde açılış animasyonu yok

            ### Notlar
            - Bu bir openAlpha sürümüdür, hatalar olabilir
            - Made with 💜 by YD Studio Team
          files: |
            SwiftX-Windows.zip
            SwiftX-Linux.zip
