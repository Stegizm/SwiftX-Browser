name: SwiftX Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── Windows Build ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: pip install pyinstaller PySide6 Pillow

      - name: PNG ikonu ICO'ya dönüştür
        run: |
          python -c "from PIL import Image; img = Image.open('data/SXBETALOGO3.png'); img.save('SXBETALOGO3.ico')"

      - name: PyInstaller ile derle
        run: pyinstaller SwiftX.spec
      # data/ klasörü spec'teki datas= ile _internal/ içine otomatik ekleniyor
      # Ekstra kopyalama yapmaya gerek yok

      - name: Zip oluştur
        run: Compress-Archive -Path dist\SwiftX\* -DestinationPath SX-272-Windows.zip

      - name: Windows artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: SX-272-Windows
          path: SX-272-Windows.zip

  # ── Linux Build ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sistem bağımlılıklarını kur
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0

      - name: Bağımlılıkları kur
        run: pip install pyinstaller PySide6 Pillow

      - name: PNG ikonu ICO'ya dönüştür
        run: |
          python -c "from PIL import Image; img = Image.open('data/SXBETALOGO3.png'); img.save('SXBETALOGO3.ico')"

      - name: PyInstaller ile derle
        run: pyinstaller SwiftX.spec
      # data/ klasörü spec'teki datas= ile _internal/ içine otomatik ekleniyor
      # Ekstra kopyalama yapmaya gerek yok

      - name: Zip oluştur
        run: cd dist && zip -r ../SX-272-Linux.zip SwiftX/

      - name: Linux artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: SX-272-Linux
          path: SX-272-Linux.zip

  # ── Release Oluştur ──────────────────────────────────────────────────────
  release:
    needs: [ build-windows, build-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Windows artifact indir
        uses: actions/download-artifact@v4
        with:
          name: SX-272-Windows
          path: ./

      - name: Linux artifact indir
        uses: actions/download-artifact@v4
        with:
          name: SX-272-Linux
          path: ./

      - name: GitHub Release yayınla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.27.2-alpha
          name: "SwiftX v0.27.2"
          body: |
            ## v0.27.2-alpha: Mini Update 2

            ### İndirme / Download
            - **Windows**: `SX-272-Windows2.zip` → zip'i aç, `SwiftX.exe` dosyasını çalıştır
            - **Linux**: `SX-272-Linux2.zip` → zip'i aç, terminalde `chmod +x SwiftX && ./SwiftX`

            > ⚠️ Windows'ta "Akıllı Uygulama Denetimi" uyarısı çıkarsa:
            > "Daha fazla bilgi edin" → "Yine de çalıştır"

            ### Bilinen Sorunlar (v0.28'de düzeltilecek)
            - Google hizmetlerinde "güvenli değil" hatası
            - YouTube videoları donabiliyor
            - Ayarlar/geçmiş menülerinde açılış animasyonu yok

            ### Notlar
            - Bu bir openAlpha sürümüdür, hatalar olabilir
            - Made with 💜 by YD Studio Team
          files: |
            SX-272-Windows.zip
            SX-272-Linux.zip
