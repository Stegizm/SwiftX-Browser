<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftX — Ana Sayfa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      color: #fff;
    }

    /* ── Arka Plan Görseli ── */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      /* Yıldızlı gökyüzü + dağ silueti — canlı, renkli bir gece fotoğrafı */
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center 55%;
      transition: opacity 1.5s ease;
    }

    /* Hafif karartma: görselin güzelliğini korur ama okunabilirliği artırır */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom,
          rgba(0, 0, 0, 0.38) 0%,
          rgba(0, 0, 0, 0.45) 40%,
          rgba(0, 0, 0, 0.72) 100%);
    }

    /* ── İçerik ── */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 24px;
    }

    /* ── Logo / Marka ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      opacity: 0.85;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      opacity: 0.85;
    }

    .logo-img {
      width: 48px;
      height: 48px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.75);
    }

    /* ── Saat ── */
    #clock {
      font-size: 100px;
      font-weight: 100;
      letter-spacing: -6px;
      color: rgba(255, 255, 255, 0.95);
      line-height: 1;
      margin-bottom: 8px;
      text-shadow: 0 4px 60px rgba(0, 0, 0, 0.4);
    }

    #date {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    /* ── Arama ── */
    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 540px;
      margin-bottom: 52px;
    }

    #search {
      width: 100%;
      height: 50px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 25px;
      padding: 0 50px 0 22px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      outline: none;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
      font-family: inherit;
      letter-spacing: 0.2px;
    }

    #search::placeholder {
      color: rgba(255, 255, 255, 0.65);
    }

    #search:focus {
      background: rgba(0, 0, 0, 0.55);
      border-color: rgba(255, 255, 255, 0.35);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
    }

    .search-btn {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .search-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* ── Hızlı Linkler ── */
    .bookmarks {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 560px;
    }

    .bookmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .bookmark:hover {
      transform: translateY(-5px) scale(1.05);
    }

    .bookmark-icon {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.40);
      border: 1px solid rgba(255, 255, 255, 0.20);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: background 0.2s, border-color 0.2s;
      overflow: hidden;
    }

    .bookmark-icon img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .bookmark:hover .bookmark-icon {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .bookmark-label {
      font-size: 10px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Alt Bar ── */
    #footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.3), transparent);
    }

    .footer-brand {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
    }

    #credit {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.3px;
    }

    #credit a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    #credit a:hover {
      color: rgba(255, 255, 255, 0.5);
    }

    /* ── Fade-in animasyonu ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      animation: fadeUp 0.8s ease 0.1s both;
    }

    #clock {
      animation: fadeUp 0.8s ease 0.2s both;
    }

    #date {
      animation: fadeUp 0.8s ease 0.3s both;
    }

    .search-wrap {
      animation: fadeUp 0.8s ease 0.4s both;
    }

    .bookmarks {
      animation: fadeUp 0.8s ease 0.5s both;
    }
  </style>
</head>

<body>

  <div id="bg"></div>
  <div id="overlay"></div>

  <div class="content">

    <!-- Logo -->
    <div class="logo">
      <img src="SXBETALOGO3.png" alt="SwiftX" style="height: 48px; vertical-align: middle;">
      <span class="logo-text">SwıftX</span>
    </div>

    <!-- Saat -->
    <div id="clock">00:00</div>
    <div id="date">Pazartesi, 1 Ocak</div>

    <!-- Arama -->
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Ara veya adres gir…" autofocus>
      <button class="search-btn" id="searchBtn" title="Ara">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>
    </div>

    <!-- Hızlı Linkler -->
    <div class="bookmarks">
      <a class="bookmark" href="https://www.youtube.com">
        <div class="bookmark-icon">
          <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=48" alt="YouTube">
        </div>
        <span class="bookmark-label">YouTube</span>
      </a>
      <a class="bookmark" href="https://github.com">
        <div class="bookmark-icon">
          <img src="https://www.google.com/s2/favicons?domain=github.com&sz=48" alt="GitHub">
        </div>
        <span class="bookmark-label">GıtHub</span>
      </a>
      <a class="bookmark" href="https://www.reddit.com">
        <div class="bookmark-icon">
          <img src="https://www.google.com/s2/favicons?domain=reddit.com&sz=48" alt="Reddit">
        </div>
        <span class="bookmark-label">Reddıt</span>
      </a>
      <a class="bookmark" href="https://x.com">
        <div class="bookmark-icon">
          <img src="https://www.google.com/s2/favicons?domain=x.com&sz=48" alt="X">
        </div>
        <span class="bookmark-label">X/Twıtter</span>
      </a>
      <a class="bookmark" href="https://mail.google.com">
        <div class="bookmark-icon">
          <img src="https://www.google.com/s2/favicons?domain=mail.google.com&sz=48" alt="Gmail">
        </div>
        <span class="bookmark-label">Gmaıl</span>
      </a>
      <a class="bookmark" href="https://www.wikipedia.org">
        <div class="bookmark-icon">
          <img src="https://www.google.com/s2/favicons?domain=wikipedia.org&sz=48" alt="Wikipedia">
        </div>
        <span class="bookmark-label">Wıkıpedıa</span>
      </a>
      <a class="bookmark" href="https://open.spotify.com">
        <div class="bookmark-icon">
          <img src="https://www.google.com/s2/favicons?domain=spotify.com&sz=48" alt="Spotify">
        </div>
        <span class="bookmark-label">Spotıfy</span>
      </a>
    </div>

  </div>

  <!-- Alt Bar -->
  <div id="footer">
    <span class="footer-brand">SX Browser</span>
    <span id="credit">
      Fotoğraf: <a href="https://unsplash.com/@jamie452" target="_blank">Jamie Fenn - Unsplash</a>
    </span>
  </div>

  <script>
    const DAYS = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
    const MONTHS = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran',
      'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];

    function tick() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;
      document.getElementById('date').textContent =
        DAYS[now.getDay()] + ',  ' + now.getDate() + ' ' + MONTHS[now.getMonth()];
    }
    tick();
    setInterval(tick, 1000);

    function navigate() {
      const val = document.getElementById('search').value.trim();
      if (!val) return;
      let url;
      if (val.startsWith('http://') || val.startsWith('https://') || val.startsWith('file://')) {
        url = val;
      } else if (val.includes('.') && !val.includes(' ')) {
        url = 'https://' + val;
      } else {
        url = 'https://www.google.com/search?q=' + encodeURIComponent(val);
      }
      location.href = url;
    }

    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Enter') navigate();
    });
    document.getElementById('searchBtn').addEventListener('click', navigate);
  </script>
</body>

</html>
